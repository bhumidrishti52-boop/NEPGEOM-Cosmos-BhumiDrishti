<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bhumi Drishti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">🌍 Bhumi Drishti</div>
        <button class="btn btn-draw" onclick="startDraw()">📍 Draw Plot Boundaries</button>
        <button class="btn btn-clear" onclick="clearMap()">🗑️ Clear Map</button>
        <button class="btn btn-gps" onclick="locateMe()">📡 Locate Me</button>
    </header>

    <div id="content">
        <div id="map"></div>
        <!-- Inside <div id="sidebar"> — replace the empty sidebar div -->

<div id="sidebar">

    <!-- 1. INSTRUCTIONS PANEL (Initial State) -->
    <div id="instructions-panel" class="panel active">
        <h2><i class="fas fa-map-marked-alt"></i> How to Analyze</h2>
        <div class="step-card">
            <div class="step-icon">1</div>
            <div class="step-text">Click <strong>Draw Plot Boundaries</strong> to start.</div>
        </div>
        <div class="step-card">
            <div class="step-icon">2</div>
            <div class="step-text">Click points on the map to outline your land.</div>
        </div>
        <div class="step-card">
            <div class="step-icon">3</div>
            <div class="step-text"><strong>Double-click</strong> to finish and start analysis.</div>
        </div>
    </div>

</div>
    </div>

</body>

</html>
